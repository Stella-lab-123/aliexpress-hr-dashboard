<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:;">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Aliexpress HR情报中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #FF6A00 0%, #FF8E53 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #FF6A00 0%, #FF8E53 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .logo svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 8px;
        }
        p.subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: #FF6A00;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF6A00 0%, #FF8E53 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 106, 0, 0.3);
        }
        .error {
            color: #dc2626;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
        <h1>Aliexpress HR情报中心</h1>
        <p class="subtitle">跨境电商行业动态看板</p>
        
        <div class="form-group">
            <label for="password">请输入访问密码</label>
            <input type="password" id="password" placeholder="请输入密码" onkeypress="if(event.key==='Enter')checkPassword()">
        </div>
        
        <button onclick="checkPassword()">进入系统</button>
        
        <p class="error" id="errorMsg">密码错误，请重试</p>
        
        <div class="footer">
            <p>此页面受密码保护</p>
            <p>仅供授权人员访问</p>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'stella';
        
        function checkPassword() {
            const input = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');
            
            if (input.value === CORRECT_PASSWORD) {
                window.location.href = 'main.html';
            } else {
                errorMsg.style.display = 'block';
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                input.value = '';
                input.focus();
            }
        }
    </script>
</body>
</html>
