<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Aliexpress HR情报中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FF6A00 0%, #FF8E53 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.98);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #FF6A00, #FF8E53);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            color: white; font-size: 28px; font-weight: bold;
        }
        h1 { font-size: 24px; text-align: center; margin-bottom: 8px; }
        p.subtitle { font-size: 14px; color: #666; text-align: center; margin-bottom: 32px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e5e7eb; border-radius: 8px;
            font-size: 16px; outline: none;
        }
        input:focus { border-color: #FF6A00; }
        button {
            width: 100%; padding: 14px; margin-top: 20px;
            background: linear-gradient(135deg, #FF6A00, #FF8E53);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .error { color: #dc2626; font-size: 14px; text-align: center; margin-top: 12px; display: none; }
        .links { margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
        .links p { font-size: 12px; color: #999; margin-bottom: 10px; text-align: center; }
        .links a {
            display: block; color: #FF6A00; text-decoration: none;
            font-size: 13px; margin: 8px 0; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">AE</div>
        <h1>Aliexpress HR情报中心</h1>
        <p class="subtitle">跨境电商行业动态看板</p>

        <label>请输入访问密码</label>
        <input type="password" id="pwd" placeholder="请输入密码" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">进入系统</button>
        <p class="error" id="err">密码错误</p>

        <div class="links">
            <p>如果无法访问，尝试以下备用链接：</p>
            <a href="https://cdn.jsdelivr.net/gh/Stella-lab-123/aliexpress-hr-dashboard@latest/main.html" target="_blank">备用链接 1 (jsDelivr)</a>
            <a href="https://ghproxy.net/https://raw.githubusercontent.com/Stella-lab-123/aliexpress-hr-dashboard/main/main.html" target="_blank">备用链接 2 (GHProxy)</a>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('pwd').value === 'stella') {
                window.location.href = 'main.html';
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }
    </script>
</body>
</html>
