<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliexpress HR情报中心 - 密码验证</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #FF6A00 0%, #FF8E53 100%);
            min-height: 100vh;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="flex items-center justify-center">
    <div id="loginPage" class="login-container rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Aliexpress HR情报中心</h1>
            <p class="text-gray-600">跨境电商行业动态看板</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">请输入访问密码</label>
                <input type="password" id="passwordInput" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all"
                    placeholder="请输入密码" onkeypress="if(event.key==='Enter')checkPassword()">
            </div>
            <button onclick="checkPassword()" 
                class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white font-semibold py-3 rounded-lg hover:from-orange-600 hover:to-orange-700 transition-all transform hover:scale-[1.02]">
                进入系统
            </button>
            <p id="errorMsg" class="text-red-500 text-sm text-center hidden">密码错误，请重试</p>
        </div>

        <div class="mt-6 text-center text-xs text-gray-400">
            <p>此页面受密码保护</p>
            <p class="mt-1">仅供授权人员访问</p>
        </div>
    </div>

    <script>
        // 设置密码（您可以修改这个密码）
        const CORRECT_PASSWORD = '2024';
        
        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const errorMsg = document.getElementById('errorMsg');
            
            if (input.value === CORRECT_PASSWORD) {
                // 密码正确，跳转到主页面
                window.location.href = 'main.html';
            } else {
                // 密码错误
                errorMsg.classList.remove('hidden');
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                input.value = '';
                input.focus();
            }
        }
    </script>
</body>
</html>
