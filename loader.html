<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FF6A00 0%, #FF8E53 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .loading-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #FF6A00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="loading-box">
        <div class="spinner"></div>
        <h2>正在加载系统...</h2>
        <p>请稍候</p>
    </div>
    <script>
        // 直接加载 main.html 内容
        fetch('https://raw.githubusercontent.com/Stella-lab-123/aliexpress-hr-dashboard/main/main.html')
            .then(r => r.text())
            .then(html => {
                document.open();
                document.write(html);
                document.close();
            })
            .catch(e => {
                document.body.innerHTML = '<div style="text-align:center;padding:40px;"><h2>加载失败</h2><p>请刷新页面重试</p></div>';
            });
    </script>
</body>
</html>
